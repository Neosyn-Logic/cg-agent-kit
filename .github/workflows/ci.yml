name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Fast checks with no external toolchain.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build-check the package + compile the Python
        run: |
          pip install build
          python -m build
          python -m py_compile cg_agent_kit/cg_mcp_server.py cg_local_client.py cg_adapt_demo.py test_cg_mcp_server.py
      - name: Validate the example dictionary
        run: |
          python - <<'PY'
          import json, pathlib
          entries = json.load(open("cg_agent_kit/manifest.json"))["entries"]
          ex = {p.stem for p in pathlib.Path("cg_agent_kit/examples").glob("*.cg")}
          print(f"{len(entries)} dictionary entries, {len(ex)} example .cg files")
          assert entries and ex, "empty dictionary or examples"
          print("manifest OK")
          PY

  # End-to-end from a user's view: build the open-source compiler, install the
  # open HDL tools, and run the full test suite against the real jar.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Icarus Verilog + Yosys
        run: sudo apt-get update -qq && sudo apt-get install -y -qq iverilog yosys

      - name: Build the open-source C⏚ compiler (cg-compiler)
        run: |
          git clone --depth 1 https://github.com/Neosyn-Logic/cg-compiler.git
          cd cg-compiler/releng && mvn -B -q clean install -DskipTests
          cd lsp-server && mvn -B -q clean package -Dproguard.skip=true
          test -f target/cg-language-server.jar

      - name: Install the kit (editable, with deps)
        run: pip install -e .

      - name: Run the test suite against the open jar
        env:
          CG_JAR: ${{ github.workspace }}/cg-compiler/releng/lsp-server/target/cg-language-server.jar
        run: python -m unittest test_cg_mcp_server -v
